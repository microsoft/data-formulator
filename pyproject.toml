[build-system]
requires = [ "setuptools >= 75.0" ]
build-backend = "setuptools.build_meta"

[project]
name = "data_formulator"
version = "0.6"

requires-python = ">=3.11"
authors = [
  {name = "Chenglong Wang", email = "chenglong.wang@microsoft.com"},
  {name = "Dan Marshall", email = "danmar@microsoft.com"},
]
readme = "README.md"
license = "MIT"
description = "Data Formulator is research protoype data visualization tool powered by AI."
keywords = ["data visualization", "LLM", "AI"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python"
]

dependencies = [
    "jupyter",
    "pandas",
    "flask",
    "flask-cors",
    "flask-limiter",
    "openai",
    "python-dotenv",
    "vega_datasets",
    "litellm",
    "duckdb",
    "numpy",
    "vl-convert-python",
    "backoff",
    "beautifulsoup4",
    "scikit-learn",
    "azure-identity",
    "azure-kusto-data",
    "azure-keyvault-secrets",
    "azure-storage-blob",
    "google-cloud-bigquery",
    "google-auth",
    "db-dtypes",
    "boto3",
    "pymysql",
    "pyodbc",
    "pymongo",
    "yfinance",
    "connectorx>=0.4.5",
    "pyarrow>=23.0.0",
    "requests",
    "mcp>=1.26.0",
]

[project.urls]
Homepage = "https://github.com/microsoft/data-formulator"
Repository = "https://github.com/microsoft/data-formulator.git"
"Bug Tracker" = "https://github.com/microsoft/data-formulator/issues"

[tool.setuptools]
package-dir = {"" = "py-src"}
include-package-data = true

[project.scripts]
data_formulator = "data_formulator:run_app"

[tool.uv]
dev-dependencies = [
    "build",
]
