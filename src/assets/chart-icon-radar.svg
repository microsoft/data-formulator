<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Radar / Spider Chart icon -->
  <!-- Concentric pentagon rings -->
  <!-- Outer ring (serves as chart boundary — standard axis style) -->
  <polygon points="128,18 233,94 193,217 63,217 23,94"
           fill="none" stroke="#363636" stroke-width="4" stroke-linejoin="round"/>
  <!-- Middle ring -->
  <polygon points="128,55 198,105 171,187 85,187 58,105"
           fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- Inner ring -->
  <polygon points="128,91 163,117 150,158 106,158 93,117"
           fill="none" stroke="#eee" stroke-width="0.6"/>
  <!-- Spokes -->
  <line x1="128" y1="128" x2="128" y2="18" stroke="#ddd" stroke-width="0.8"/>
  <line x1="128" y1="128" x2="233" y2="94" stroke="#ddd" stroke-width="0.8"/>
  <line x1="128" y1="128" x2="193" y2="217" stroke="#ddd" stroke-width="0.8"/>
  <line x1="128" y1="128" x2="63" y2="217" stroke="#ddd" stroke-width="0.8"/>
  <line x1="128" y1="128" x2="23" y2="94" stroke="#ddd" stroke-width="0.8"/>
  <!-- Data polygon A (blue) -->
  <polygon points="128,39 210,106 179,204 75,185 39,106"
           fill="#d4edff" stroke="#76c6ff" stroke-width="2"/>
  <!-- Data polygon B (gray) -->
  <polygon points="128,63 185,124 161,192 88,167 57,112"
           fill="#e8e8e8" stroke="#B8B8B8" stroke-width="2"/>
  <!-- Points A -->
  <circle cx="128" cy="39" r="3.5" fill="#76c6ff"/>
  <circle cx="210" cy="106" r="3.5" fill="#76c6ff"/>
  <circle cx="179" cy="204" r="3.5" fill="#76c6ff"/>
  <circle cx="75" cy="185" r="3.5" fill="#76c6ff"/>
  <circle cx="39" cy="106" r="3.5" fill="#76c6ff"/>
  <!-- Points B -->
  <circle cx="128" cy="63" r="3.5" fill="#B8B8B8"/>
  <circle cx="185" cy="124" r="3.5" fill="#B8B8B8"/>
  <circle cx="161" cy="192" r="3.5" fill="#B8B8B8"/>
  <circle cx="88" cy="167" r="3.5" fill="#B8B8B8"/>
  <circle cx="57" cy="112" r="3.5" fill="#B8B8B8"/>
</svg>
