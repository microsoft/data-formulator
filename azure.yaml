name: data-formulator
metadata:
  template: data-formulator@0.1.0
services:
  web:
    project: .
    language: docker
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true
    host: containerapp
  mcp-gateway:
    project: .
    language: docker
    docker:
      path: ./Dockerfile.mcp-gateway
      context: .
      remoteBuild: true
    host: containerapp
