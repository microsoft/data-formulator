<svg xmlns="http://www.w3.org/2000/svg" width="240" height="100" viewBox="0 0 240 100">
  <rect width="240" height="100" fill="#f0fff4"/>
  <!-- Histogram bars (normal distribution shape) -->
  <rect x="15" y="80" width="18" height="14" fill="#2980b9" opacity="0.7"/>
  <rect x="37" y="65" width="18" height="29" fill="#2980b9" opacity="0.8"/>
  <rect x="59" y="42" width="18" height="52" fill="#2980b9" opacity="0.9"/>
  <rect x="81" y="28" width="18" height="66" fill="#27ae60" opacity="0.9"/>
  <rect x="103" y="35" width="18" height="59" fill="#27ae60" opacity="0.9"/>
  <rect x="125" y="50" width="18" height="44" fill="#2980b9" opacity="0.8"/>
  <rect x="147" y="68" width="18" height="26" fill="#2980b9" opacity="0.7"/>
  <rect x="169" y="80" width="18" height="14" fill="#2980b9" opacity="0.6"/>
  <rect x="191" y="86" width="18" height="8" fill="#e74c3c" opacity="0.7"/>
  <!-- LL vertical line -->
  <line x1="55" y1="5" x2="55" y2="95" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- UL vertical line -->
  <line x1="185" y1="5" x2="185" y2="95" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- TARGET vertical line -->
  <line x1="120" y1="5" x2="120" y2="95" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Labels -->
  <text x="32" y="10" font-size="8" fill="#e67e22" font-family="sans-serif">LL</text>
  <text x="160" y="10" font-size="8" fill="#e67e22" font-family="sans-serif">UL</text>
  <text x="104" y="10" font-size="8" fill="#27ae60" font-family="sans-serif">TARGET</text>
</svg>
