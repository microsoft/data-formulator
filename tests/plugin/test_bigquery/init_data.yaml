# BigQuery Emulator Initialization Data
# This file creates sample datasets, tables, and data for testing.
#
# Note: Timestamp-like columns use STRING (ISO8601) instead of TIMESTAMP because
# the goccy bigquery-emulator serializes TIMESTAMP in query results as float
# strings (e.g. "1704103200.0"), which the Google BigQuery Python client rejects
# (it expects integer and calls int(value)). Using STRING avoids this mismatch.

projects:
  - id: test-project
    datasets:
      - id: sample
        tables:
          - id: products
            columns:
              - name: id
                type: INT64
              - name: name
                type: STRING
              - name: category
                type: STRING
              - name: price
                type: FLOAT64
              - name: stock_quantity
                type: INT64
              - name: created_at
                type: STRING
            data:
              - id: 1
                name: "Laptop Pro 15"
                category: "Electronics"
                price: 1299.99
                stock_quantity: 50
