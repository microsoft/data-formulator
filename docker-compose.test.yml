# Unified test-database stack for data-loader integration tests.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d          # start all
#   docker compose -f docker-compose.test.yml up -d mysql     # start one
#   pytest tests/plugin/test_mysql/ -v                        # run tests
#   docker compose -f docker-compose.test.yml down            # tear down
#
# See tests/plugin/README.md for details.

services:
  mysql:
    build: tests/plugin/test_mysql
    container_name: df-test-mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: testdb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmysql"]
      interval: 5s
      timeout: 3s
      retries: 15

  postgres:
    build: tests/plugin/test_postgres
    container_name: df-test-postgres
    ports:
      - "${PG_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    build: tests/plugin/test_mongodb
    container_name: df-test-mongodb
    ports:
      - "${MONGO_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: testdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  bigquery:
    build: tests/plugin/test_bigquery
    container_name: df-test-bigquery
    ports:
      - "${BQ_PORT:-9050}:9050"
      - "${BQ_GRPC_PORT:-9060}:9060"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9050 || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 10
