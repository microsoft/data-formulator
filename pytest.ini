[pytest]
testpaths =
    tests/backend
    tests/frontend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    backend: backend unit or integration tests
    frontend: frontend-related contract or integration tests
    contract: boundary contract tests
    security: security-focused tests (sandbox confinement, auth, signing)
    xfail_known_bug: regression tests for known bugs
