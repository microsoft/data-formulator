[pytest]
testpaths =
    tests/backend
    tests/frontend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    backend: backend tests
    frontend: frontend tests
    security: security tests (sandbox, auth, signing)
    auth: authentication provider tests
    vault: credential vault tests
    xfail_known_bug: regression tests for known bugs
